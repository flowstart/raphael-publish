<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raphael Clip · 排版预览</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --border: #e4e7ec;
      --text: #18212f;
      --text-2: #5d6b82;
      --text-3: #98a2b3;
      --green: #07c160;
      --green-dark: #06ad56;
      --green-soft: #e6f8ee;
      --radius: 12px;
      --radius-s: 8px;
      --shadow-card: 0 1px 2px rgba(16, 24, 40, 0.04), 0 8px 24px rgba(16, 24, 40, 0.06);
      --shadow-paper: 0 1px 3px rgba(16, 24, 40, 0.08), 0 16px 48px rgba(16, 24, 40, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---------- header ---------- */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 60px;
      padding: 0 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-right: auto; }
    .brand-logo {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--green), #2dd4bf);
      color: #fff; font-weight: 700; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
    }
    .brand-title { font-size: 15px; font-weight: 650; line-height: 1.2; }
    .brand-sub { font-size: 11.5px; color: var(--text-3); }

    .segmented {
      display: inline-flex;
      background: #eef0f3;
      border-radius: 9px;
      padding: 3px;
    }
    .segmented button {
      appearance: none; border: none; cursor: pointer;
      background: transparent; color: var(--text-2);
      font-size: 12.5px; padding: 5px 12px; border-radius: 7px;
    }
    .segmented button.active {
      background: #fff; color: var(--text); font-weight: 550;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.12);
    }

    .btn {
      appearance: none; cursor: pointer; font-size: 13px;
      border: 1px solid var(--border); background: var(--panel); color: var(--text-2);
      border-radius: 9px; padding: 8px 14px;
      transition: background 0.12s ease;
    }
    .btn:hover { background: #f6f7f9; }
    .btn.active { border-color: var(--green); color: var(--green-dark); background: var(--green-soft); }
    .btn-primary {
      background: var(--green); border-color: var(--green); color: #fff; font-weight: 550;
      padding: 8px 18px;
    }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }

    /* ---------- layout ---------- */
    main { flex: 1; display: flex; min-height: 0; }

    /* ---------- theme sidebar ---------- */
    aside {
      width: 264px; flex-shrink: 0; overflow-y: auto;
      background: var(--panel); border-right: 1px solid var(--border);
      padding: 16px 14px 48px;
    }
    .side-hint {
      font-size: 11.5px; color: var(--text-3); line-height: 1.6;
      background: var(--bg); border-radius: var(--radius-s);
      padding: 8px 10px; margin-bottom: 6px;
    }
    .group-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      color: var(--text-3); text-transform: uppercase;
      padding: 16px 4px 8px;
    }
    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .theme-card {
      position: relative; cursor: pointer;
      border: 1.5px solid var(--border); border-radius: var(--radius-s);
      background: var(--panel); padding: 5px;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .theme-card:hover { border-color: #c9cfd8; box-shadow: var(--shadow-card); }
    .theme-card.selected { border-color: var(--green); box-shadow: 0 0 0 2.5px rgba(7, 193, 96, 0.18); }

    .swatch {
      position: relative; height: 52px; border-radius: 5px; overflow: hidden;
      border: 1px solid rgba(16, 24, 40, 0.06);
      display: flex; align-items: center; justify-content: center;
    }
    .swatch-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
    .swatch-aa { font-size: 17px; font-weight: 650; }
    .theme-name {
      display: block; font-size: 11.5px; color: var(--text-2);
      text-align: center; padding: 6px 2px 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .theme-card.selected .theme-name { color: var(--green-dark); font-weight: 600; }

    .pin-btn {
      position: absolute; top: 8px; right: 8px;
      width: 22px; height: 22px; border-radius: 6px;
      border: none; cursor: pointer;
      background: rgba(255, 255, 255, 0.88); color: #b6bdc9;
      font-size: 12px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.12s ease;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.15);
    }
    .theme-card:hover .pin-btn { opacity: 1; }
    .pin-btn.pinned { opacity: 1; color: #fff; background: var(--green); }
    .pin-btn:hover { color: var(--green-dark); }
    .pin-btn.pinned:hover { color: #fff; background: var(--green-dark); }

    /* ---------- preview center ---------- */
    .center { flex: 1; overflow-y: auto; padding: 36px 28px 64px; }
    .paper-wrap { display: flex; justify-content: center; }
    .paper {
      width: 480px; max-width: 100%;
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow-paper); overflow: hidden;
      transition: width 0.25s ease;
    }

    /* ---------- editor drawer ---------- */
    .drawer {
      width: 340px; flex-shrink: 0; overflow: hidden;
      background: var(--panel); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: width 0.2s ease;
    }
    .drawer.collapsed { width: 0; border-left: none; }
    .drawer-head {
      display: flex; align-items: baseline; gap: 8px;
      padding: 16px 16px 10px; flex-shrink: 0;
    }
    .drawer-head h2 { font-size: 13px; font-weight: 600; }
    .drawer-head span { font-size: 11.5px; color: var(--text-3); }
    #md-editor {
      flex: 1; margin: 0 16px 16px; padding: 12px;
      border: 1px solid var(--border); border-radius: var(--radius-s);
      font: 12.5px/1.7 "SF Mono", Menlo, Consolas, monospace;
      color: var(--text); resize: none; outline: none; min-width: 300px;
    }
    #md-editor:focus { border-color: var(--green); }

    /* ---------- toast ---------- */
    .toast {
      position: fixed; left: 50%; bottom: 44px;
      transform: translateX(-50%) translateY(10px);
      background: rgba(24, 33, 47, 0.92); color: #fff;
      font-size: 13px; padding: 10px 20px; border-radius: 10px;
      opacity: 0; transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none; z-index: 99; max-width: 80vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-logo">R</div>
      <div>
        <div class="brand-title">Raphael Clip</div>
        <div class="brand-sub">公众号排版预览 · 引擎来自 raphael-publish</div>
      </div>
    </div>
    <div class="segmented" id="width-seg">
      <button data-w="480" class="active">手机</button>
      <button data-w="768">平板</button>
      <button data-w="100%">全宽</button>
    </div>
    <button class="btn" id="editor-toggle">编辑</button>
    <button class="btn" id="copy-md-btn">复制 Markdown</button>
    <button class="btn btn-primary" id="copy-btn">复制到公众号</button>
  </header>
  <main>
    <aside>
      <div class="side-hint">置顶 <b>📌</b> 的主题（最多 4 个）会出现在聊天页按钮的下拉菜单里。</div>
      <div id="theme-list"></div>
    </aside>
    <div class="center"><div class="paper-wrap"><div class="paper" id="preview-frame"></div></div></div>
    <div class="drawer" id="drawer">
      <div class="drawer-head"><h2>Markdown</h2><span>改动实时刷新预览</span></div>
      <textarea id="md-editor" spellcheck="false"></textarea>
    </div>
  </main>
  <div class="toast" id="toast"></div>
  <script src="preview.js"></script>
</body>
</html>
